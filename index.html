<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>For Tapati ❤️</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, sans-serif;
    }

    body{
      background:black;
      overflow:hidden;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
    }

    .container{
      position:absolute;
      width:100%;
      height:100%;
    }

    .text{
      position:absolute;
      color:#ff4d6d;
      font-size:28px;
      font-weight:bold;
      white-space:nowrap;
      animation: float 12s linear infinite;
      text-shadow:0 0 10px #ff4d6d;
    }

    @keyframes float{
      0%{
        transform:translateY(100vh) translateX(0);
        opacity:0;
      }
      10%{
        opacity:1;
      }
      100%{
        transform:translateY(-120vh) translateX(100px);
        opacity:0;
      }
    }

    .center{
      position:absolute;
      color:white;
      font-size:40px;
      text-align:center;
      z-index:10;
      text-shadow:0 0 20px #ff4d6d;
    }
  </style>
</head>

<body>

  <div class="center">
    ❤️ I Love You Tapati ❤️
  </div>

  <div class="container" id="container"></div>

  <script>
    const container = document.getElementById("container");

    function createText(){
      const text = document.createElement("div");
      text.classList.add("text");

      text.innerText = "I Love You Tapati ❤️";

      text.style.left = Math.random() * 100 + "vw";
      text.style.fontSize = (20 + Math.random() * 30) + "px";
      text.style.animationDuration = (6 + Math.random() * 10) + "s";

      container.appendChild(text);

      setTimeout(()=>{
        text.remove();
      },15000);
    }

    setInterval(createText, 150);
  </script>

</body>
</html>
